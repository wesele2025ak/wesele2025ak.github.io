<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photo Drop</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="apple-touch-icon" href="./assets/icon-192.png" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    body{font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin:0; padding:16px;}
    .card{max-width:720px; margin:0 auto; border:1px solid #eee; border-radius:16px; padding:16px; box-shadow:0 4px 12px rgba(0,0,0,.04)}
    .row{display:flex; gap:12px; align-items:center;}
    .hidden{display:none}
    .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:8px; margin-top:12px}
    .thumb{position:relative; border-radius:8px; overflow:hidden;}
    .thumb img{width:100%; height:100%; object-fit:cover; display:block}
    button{padding:12px 16px; border-radius:10px; border:1px solid #ddd; background:#fff; cursor:pointer}
    button.primary{background:#111; color:#fff; border-color:#111}
    progress{width:100%}
  </style>
</head>
<body>
  <div class="card">
    <h1>Prześlij zdjęcia</h1>
    <p id="eventInfo"></p>
    
    
    <div class="row">
      <input id="file" type="file" accept="image/*" capture="environment" multiple />
      <button id="shoot">Zrób zdjęcie</button>
    </div>
    
    
    <div class="grid" id="preview"></div>
    
    
    <div class="row" style="margin-top:12px">
      <button id="send" class="primary">Wyślij</button>
      <button id="clear">Wyczyść</button>
    </div>
    
    
    <div class="row" style="margin-top:12px">
      <progress id="prog" max="100" value="0" class="hidden"></progress>
      <span id="status"></span>
    </div>
    
    
    <!-- Invisible Turnstile placeholder -->
    <div id="cf" class="cf-turnstile" data-sitekey="0x4AAAAAAB23OR0zpvaIh2Vj" data-size="invisible" data-callback="onCaptcha"></div>
  </div>
  
  
  <script type="module" src="./main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
